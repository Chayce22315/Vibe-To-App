name: VibeToApp
options:
  bundleIdPrefix: com.PixelatedStudios
targets:
  VibeToApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: .
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.PixelatedStudios.vibetoapp
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
